edition = "2023";

message ConnectionRequest {
  Type type = 1;
  string client_name = 2;
  bytes client_identifier = 3;
  enum Type {
    RPC = 0;
    STREAM = 1;
  };
}

message TelemetryPayload {
  int32 status = 1;
  float roll = 2;
  float pitch = 3;
  float yaw = 4;
  int32 encoder_count = 5;
}

