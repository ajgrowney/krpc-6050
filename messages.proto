edition = "2023";

message ConnectionRequest {
  Type type = 1;
  string client_name = 2;
  bytes client_identifier = 3;
  enum Type {
    RPC = 0;
    STREAM = 1;
  };
}

message TelemetryPayload {
  int32 status = 1;
  float roll = 2;
  float pitch = 3;
  float yaw = 4;
  int32 encoder_count = 5;
}

message RealTelemetryPayload {
  uint32 packet_version = 1;   // v1 uses value 1
  uint32 sequence = 2;         // low 16 bits used on wire
  uint32 status_mask = 3;      // bit assignments defined in the protocol doc

  sfixed32 yaw_cdeg = 4;       // centidegrees, e.g. 25.34 deg -> 2534
  sfixed32 pitch_cdeg = 5;     // centidegrees
  sfixed32 roll_cdeg = 6;      // centidegrees

  sfixed32 encoder_ticks = 7;  // signed count from wire
}
